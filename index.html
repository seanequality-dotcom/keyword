<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키워드 가격 보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-2: #f5f5f3; --bg-3: #ededeb;
      --text: #1a1a18; --text-2: #6b6b67; --text-3: #9b9b97;
      --border: rgba(0,0,0,0.11); --border-2: rgba(0,0,0,0.20);
      --accent: #1a6fb5; --green: #2a7d4f; --red: #c0392b;
      --r-md: 8px; --r-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1a; --bg-2:#272725; --bg-3:#313130;
        --text:#f0efe8; --text-2:#a8a8a4; --text-3:#6b6b67;
        --border:rgba(255,255,255,0.09); --border-2:rgba(255,255,255,0.18);
        --accent:#5aabf0; --green:#4caf80; --red:#e57373;
      }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg-3); color:var(--text); min-height:100vh; padding:2rem 1rem; }
    .container { max-width:860px; margin:0 auto; }
    h1 { font-size:22px; font-weight:500; margin-bottom:4px; }
    .subtitle { font-size:14px; color:var(--text-2); margin-bottom:1.5rem; }
    .card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; margin-bottom:1rem; }
    .label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.06em; color:var(--text-2); margin-bottom:10px; }
    .row { display:flex; gap:8px; margin-bottom:8px; }
    input[type=text] {
      flex:1; background:var(--bg-2); border:0.5px solid var(--border); border-radius:var(--r-md);
      padding:8px 12px; font-size:14px; color:var(--text); outline:none; font-family:inherit;
      transition:border-color .15s;
    }
    input:focus { border-color:var(--border-2); box-shadow:0 0 0 3px rgba(24,95,165,0.1); }
    input::placeholder { color:var(--text-3); }
    button {
      background:transparent; border:0.5px solid var(--border-2); border-radius:var(--r-md);
      padding:8px 14px; font-size:13px; color:var(--text); cursor:pointer;
      display:inline-flex; align-items:center; gap:5px; font-family:inherit;
      transition:background .12s, transform .08s; white-space:nowrap;
    }
    button:hover { background:var(--bg-2); }
    button:active { transform:scale(.98); }
    .tag-list { display:flex; flex-wrap:wrap; gap:6px; min-height:34px; }
    .tag { display:inline-flex; align-items:center; gap:5px; font-size:13px; padding:4px 10px 4px 12px; border-radius:20px; background:var(--bg-2); border:0.5px solid var(--border); }
    .tag-del { background:none; border:none; padding:0; font-size:16px; line-height:1; color:var(--text-3); cursor:pointer; }
    .tag-del:hover { color:var(--text); background:none; transform:none; }

    .run-btn { width:100%; font-size:15px; padding:12px; margin-bottom:1.5rem; border-radius:var(--r-md); justify-content:center; font-weight:500; }
    .run-btn.loading { opacity:.6; pointer-events:none; }

    /* 옵션 */
    select {
      background:var(--bg-2); border:0.5px solid var(--border); border-radius:var(--r-md);
      padding:5px 10px; font-size:13px; color:var(--text); outline:none; font-family:inherit; cursor:pointer;
    }

    /* 결과 — 리스트형 */
    .kw-section { margin-bottom:2rem; }
    .kw-heading {
      font-size:15px; font-weight:500; margin-bottom:8px;
      display:flex; align-items:center; gap:7px; padding-bottom:8px;
      border-bottom:0.5px solid var(--border);
    }
    .kw-heading i { color:var(--text-2); font-size:14px; }
    .kw-count { font-size:12px; color:var(--text-3); font-weight:400; margin-left:auto; }

    .product-list { display:flex; flex-direction:column; gap:0; }
    .product-row {
      display:flex; align-items:center; gap:14px;
      padding:10px 0;
      border-bottom:0.5px solid var(--border);
      text-decoration:none; color:inherit;
      transition:background .1s;
      border-radius:4px;
    }
    .product-row:last-child { border-bottom:none; }
    .product-row:hover { background:var(--bg-2); padding-left:6px; padding-right:6px; margin:0 -6px; }
    .product-rank {
      font-size:12px; color:var(--text-3); min-width:20px;
      text-align:center; flex-shrink:0;
    }
    .product-thumb {
      width:56px; height:56px; border-radius:var(--r-md);
      object-fit:cover; background:var(--bg-2); flex-shrink:0;
      border:0.5px solid var(--border);
    }
    .product-thumb-placeholder {
      width:56px; height:56px; border-radius:var(--r-md);
      background:var(--bg-2); border:0.5px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-3); font-size:20px; flex-shrink:0;
    }
    .product-meta { flex:1; min-width:0; }
    .product-name {
      font-size:13px; color:var(--text-2); line-height:1.4;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:3px;
    }
    .product-mall { font-size:11px; color:var(--text-3); }
    .product-price {
      font-size:15px; font-weight:500; color:var(--text);
      flex-shrink:0; text-align:right;
    }
    .product-link-icon { font-size:13px; color:var(--text-3); flex-shrink:0; }

    .loading-row { display:flex; align-items:center; gap:8px; padding:1rem 0; color:var(--text-2); font-size:13px; }
    .spinner { width:15px; height:15px; border:2px solid var(--border-2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { font-size:13px; color:var(--red); padding:.5rem 0; display:flex; align-items:center; gap:6px; }
    .empty { text-align:center; padding:2rem 0; color:var(--text-3); font-size:14px; }
    footer { margin-top:3rem; text-align:center; font-size:12px; color:var(--text-3); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1><i class="ti ti-shopping-cart" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>키워드 가격 보드</h1>
    <p class="subtitle">키워드별 네이버 쇼핑 최저가를 바로 확인하세요.</p>
  </header>

  <!-- 키워드 -->
  <div class="card">
    <div class="label">키워드</div>
    <div class="row">
      <input type="text" id="kw-input" placeholder="예: 닌텐도 스위치 2" />
      <button onclick="addKeyword()"><i class="ti ti-plus"></i> 추가</button>
    </div>
    <div class="tag-list" id="kw-list"></div>
  </div>

  <!-- 옵션 -->
  <div class="card">
    <div class="label">검색 옵션</div>
    <div class="row" style="align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:0">
      <label style="font-size:13px;color:var(--text-2)">정렬</label>
      <select id="sort">
        <option value="sim">관련도순</option>
        <option value="asc">가격 낮은순</option>
        <option value="dsc">가격 높은순</option>
        <option value="date">최신순</option>
      </select>
      <label style="font-size:13px;color:var(--text-2)">개수</label>
      <select id="display">
        <option value="5">5개</option>
        <option value="10" selected>10개</option>
        <option value="20">20개</option>
      </select>
    </div>
  </div>

  <button class="run-btn" id="run-btn" onclick="runAll()">
    <i class="ti ti-refresh"></i> 가격 검색
  </button>

  <div id="results"></div>

  <footer>검색 결과는 네이버 쇼핑 API 기준입니다.</footer>
</div>

<script>
const PROXY_BASE = 'https://wandering-credit-1d0b.sean-equality.workers.dev';
const LS_KW = 'kw-board-keywords';
let keywords = [];

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 키워드 ───────────────────────────────────────────────────
function loadKeywords() {
  try { keywords = JSON.parse(localStorage.getItem(LS_KW) || '[]'); } catch { keywords = []; }
  if (!keywords.length) keywords = ['닌텐도 스위치', '에어팟'];
  renderKeywords();
}
function saveKeywords() { localStorage.setItem(LS_KW, JSON.stringify(keywords)); }
function renderKeywords() {
  document.getElementById('kw-list').innerHTML = keywords.map((k,i) =>
    `<span class="tag">${escHtml(k)}<button class="tag-del" onclick="removeKeyword(${i})">×</button></span>`
  ).join('');
}
function addKeyword() {
  const inp = document.getElementById('kw-input');
  const v = inp.value.trim();
  if (v && !keywords.includes(v)) { keywords.push(v); saveKeywords(); renderKeywords(); }
  inp.value = ''; inp.focus();
}
function removeKeyword(i) { keywords.splice(i,1); saveKeywords(); renderKeywords(); }
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('kw-input').addEventListener('keydown', e => { if(e.key==='Enter') addKeyword(); });
});

// ── API ──────────────────────────────────────────────────────
async function fetchNaver(keyword, sort, display) {
  const q   = encodeURIComponent(keyword);
  const api = `https://openapi.naver.com/v1/search/shop.json?query=${q}&display=${display}&sort=${sort}`;
  const url = `${PROXY_BASE}?url=${encodeURIComponent(api)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.errorCode) throw new Error(data.errorMessage || '네이버 API 오류');
  return data.items || [];
}

// ── 리스트 렌더 ──────────────────────────────────────────────
function renderList(items) {
  if (!items.length) return '<p class="empty">검색 결과가 없습니다.</p>';
  return `<div class="product-list">${items.map((item, idx) => {
    const name  = item.title.replace(/<[^>]+>/g, '');
    const price = Number(item.lprice).toLocaleString('ko-KR');
    const img   = item.image;
    const link  = item.link;
    const mall  = item.mallName || '';
    return `<a class="product-row" href="${escHtml(link)}" target="_blank" rel="noopener">
      <span class="product-rank">${idx + 1}</span>
      ${img
        ? `<img class="product-thumb" src="${escHtml(img)}" alt="${escHtml(name)}" loading="lazy" />`
        : `<div class="product-thumb-placeholder"><i class="ti ti-photo-off"></i></div>`}
      <div class="product-meta">
        <div class="product-name">${escHtml(name)}</div>
        <div class="product-mall">${escHtml(mall)}</div>
      </div>
      <div class="product-price">₩${price}</div>
      <i class="ti ti-external-link product-link-icon"></i>
    </a>`;
  }).join('')}</div>`;
}

// ── 전체 실행 ────────────────────────────────────────────────
async function runAll() {
  if (!keywords.length) {
    document.getElementById('results').innerHTML = '<p class="empty">키워드를 추가하세요.</p>';
    return;
  }
  const sort    = document.getElementById('sort').value;
  const display = document.getElementById('display').value;
  const btn     = document.getElementById('run-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> 검색 중…';

  const res = document.getElementById('results');
  res.innerHTML = '';

  await Promise.all(keywords.map(async kw => {
    const sec = document.createElement('div');
    sec.className = 'kw-section';
    sec.innerHTML = `<div class="kw-heading"><i class="ti ti-tag"></i>${escHtml(kw)}<span class="kw-count"></span></div>
      <div class="loading-row"><span class="spinner"></span>불러오는 중…</div>`;
    res.appendChild(sec);
    try {
      const items = await fetchNaver(kw, sort, display);
      sec.querySelector('.kw-count').textContent = `${items.length}개`;
      sec.querySelector('.loading-row').outerHTML = renderList(items);
    } catch(e) {
      sec.querySelector('.loading-row').outerHTML =
        `<p class="error-msg"><i class="ti ti-alert-circle"></i> 오류: ${escHtml(e.message)}</p>`;
    }
  }));

  btn.classList.remove('loading');
  btn.innerHTML = '<i class="ti ti-refresh"></i> 가격 검색';
}

loadKeywords();
</script>
</body>
</html>
